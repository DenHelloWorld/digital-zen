<!-- Template fragment for icon -->
<ng-template #icon let-iconHref="href" let-iconClass="class" let-width="width" let-height="height">
  <svg
    [class]="iconClass || 'dz-icon'"
    aria-hidden="true"
    focusable="false"
    [attr.width]="width"
    [attr.height]="height"
  >
    <use [attr.href]="iconHref" [attr.width]="width" [attr.height]="height" />
  </svg>
</ng-template>

<div class="dz-actions">
  <button
    [title]="uiText.FOCUS.ADD_CURRENT_TAB_TITLE"
    (click)="addCurrentTabToPeriod()"
    class="dz-button dz-button--sm shadow"
    [class.hidden]="!isHttpUrl(activeTab()?.url) || isCurrentTabUnblockable()"
  >
    @if (isSvgIcon(activeTab()?.favIconUrl)) {
      <ng-container
        *ngTemplateOutlet="
          icon;
          context: {
            href: activeTab()?.favIconUrl ? activeTab()?.favIconUrl : icons.SAVE,
            class: 'dz-icon dz-icon--shadow',
            width: 20,
            height: 20,
          }
        "
      ></ng-container>
    } @else if (isImageIcon(activeTab()?.favIconUrl)) {
      <img
        class="dz-icon dz-icon--shadow"
        [src]="activeTab()?.favIconUrl"
        width="20"
        height="20"
        alt="Favicon"
      />
    } @else {
      <ng-container
        *ngTemplateOutlet="
          icon;
          context: { href: icons.GLOBE, class: 'dz-icon dz-icon--shadow', width: 20, height: 20 }
        "
      ></ng-container>
    }

    <ng-container
      *ngTemplateOutlet="
        icon;
        context: { href: icons.PLUS, class: 'dz-icon dz-icon--shadow', width: 20, height: 20 }
      "
    ></ng-container>
  </button>

  <button
    [title]="uiText.FOCUS.TOGGLE_FOCUS_TITLE"
    (click)="toggleFocus()"
    class="dz-button dz-button--xl dz-button--round shadow"
    [class.dz-button--activated]="currentPeriod()?.isFocused"
  >
    <svg
      class="dz-icon"
      [class.pulse]="currentPeriod()?.isFocused"
      aria-hidden="true"
      focusable="false"
    >
      <use [attr.href]="icons.PERSON_ZEN"></use>
    </svg>

    <span class="focus-timer">{{ focusElapsedTimeFormatted() }}</span>
  </button>
</div>

<div class="dz-group">
  @if (displayedPeriods().length) {
    <ul class="dz-list">
      @for (period of displayedPeriods(); track period.id) {
        <li>
          <dz-period
            [period]="period"
            [totalPeriodsCount]="periodsCount()"
            [isCurrent]="isPeriodCurrent(period)"
            [isFocusActive]="isFocusActive()"
            (toggleBlockedWebsite)="onToggleBlockedWebsite($event)"
          />
        </li>
      }
    </ul>
  } @else {
    <dz-loader />
  }
</div>
