<!-- Template fragment for icon -->
<ng-template #icon let-iconHref="href" let-iconClass="class" let-width="width" let-height="height">
  <svg
    [class]="iconClass || 'dz-icon'"
    [attr.width]="width"
    [attr.height]="height"
    aria-hidden="true"
    focusable="false"
  >
    <use [attr.href]="iconHref" [attr.width]="width" [attr.height]="height" />
  </svg>
</ng-template>

<div class="dz-focus__header">
  <div class="dz-focus__tab">
    <button
      class="dz-button dz-button--md dz-button--tab"
      [disabled]="isTabButtonDisabled()"
      [title]="
        activeTab() ? uiText.FOCUS.ADD_CURRENT_TAB_TITLE : uiText.FOCUS.CANNOT_ADD_CURRENT_TAB_TITLE
      "
      (click)="blockCurrentTab()"
    >
      @if (isSvgIcon(activeTab()?.favIconUrl)) {
        <ng-container
          *ngTemplateOutlet="
            icon;
            context: {
              href: activeTab()?.favIconUrl ? activeTab()?.favIconUrl : icons.SAVE,
              class: 'dz-icon dz-icon--shadow',
            }
          "
        ></ng-container>
      } @else if (isImageIcon(activeTab()?.favIconUrl)) {
        <img
          class="dz-icon dz-icon--shadow"
          [src]="activeTab()?.favIconUrl"
          width="20"
          height="20"
          alt="Favicon"
        />
      } @else {
        <ng-container
          *ngTemplateOutlet="
            icon;
            context: {
              href: icons.GLOBE,
              class: 'dz-icon dz-icon--shadow',
              width: 20,
              height: 20,
            }
          "
        ></ng-container>
      }

      <span class="dz-focus__tab-title">
        {{ activeTab()?.title ?? uiText.FOCUS.CANNOT_ADD_CURRENT_TAB_TITLE }}</span
      >

      @let href =
        !isTabButtonDisabled()
          ? isCurrentTabInCurrentPeriod()
            ? icons.CHECK
            : icons.ADD_LINK
          : null;
      <ng-container *ngTemplateOutlet="icon; context: { href }"></ng-container>
    </button>
  </div>
</div>

<div class="dz-focus__main">
  @if (displayedPeriods().length) {
    <ul class="dz-list">
      @for (period of displayedPeriods(); track period.id) {
        <li>
          <dz-period
            [period]="period"
            [totalPeriodsCount]="periodsCount()"
            [isCurrent]="isPeriodCurrent(period)"
            [isFocusActive]="isFocusActive()"
          />
        </li>
      }
    </ul>
  } @else {
    <dz-loader />
  }
</div>

<div class="dz-focus__footer dz-box shadow">
  <button
    class="dz-button dz-button--full dz-button--md shadow dz-button--activated"
    [title]="currentPeriod()?.isActive ? uiText.FOCUS.STOP : uiText.FOCUS.START"
    [class.dz-button--ghost]="currentPeriod()?.isActive"
    (click)="toggleFocus()"
  >
    @let text =
      (currentPeriod()?.isActive ? uiText.FOCUS.STOP : uiText.FOCUS.START) +
      ' ' +
      currentPeriod()?.name;
    @let iconHref = currentPeriod()?.isActive ? icons.STOP : icons.PLAY_ARROW;

    <ng-container *ngTemplateOutlet="icon; context: { href: iconHref }"></ng-container>

    <span class="dz-focus__activation">
      {{ text }}
    </span>
  </button>
</div>
