<details
  open
  class="dz-accordion dz-accordion--accent"
  [class.dz-accordion--accent]="period().isFocused"
>
  <summary class="dz-accordion__header">
    <span>
      <h2 class="title">
        {{ period().name }}
      </h2>
    </span>

    <span class="dz-accordion__icon">⯆</span>
  </summary>

  <div class="dz-accordion__content">
    <dz-time-line [startFrom]="period().startFrom" [endTo]="period().endTo" />

    <p class="description">
      {{ period().description }}
    </p>

    <div class="weekdays">
      <dz-weekdays-selector [selectedDays]="selectedDays()" [isSelectable]="false" />
    </div>

    <ul class="dz-list dz-list--horizontal dz-list--full" aria-labelledby="social-title">
      @for (site of period().webSites; track site) {
        <li>
          <button
            class="dz-button dz-button--md shadow"
            [class.dz-button--square]="site.iconUrl || site.imageUrl"
            [class.dz-button--error]="site.isBlocked"
            [class.shadow--activated]="site.isBlocked"
            [title]="site.name"
            (click)="onToggleBlockedWebsite(site)"
          >
            @if (site.iconUrl) {
              <svg class="dz-icon dz-icon--shadow" aria-hidden="true" focusable="false">
                <use width="24" height="24" [attr.href]="site.iconUrl"></use>
              </svg>
            } @else if (site.imageUrl) {
              <img class="dz-icon dz-icon--shadow" [src]="site.imageUrl" [alt]="site.name" />
            } @else {
              {{ site.name }}
            }
          </button>
        </li>
      }
    </ul>
  </div>
</details>
