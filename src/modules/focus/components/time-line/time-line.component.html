<span class="start-time">{{ startFrom() | date: 'HH:mm' }}</span>

<div class="scale-bar">
  <div class="now" [style.left.%]="nowPercent()">
    <div class="now__indicator">●</div>

    <div class="now__label">{{ uiText.TIME_LINE.NOW_LABEL }} {{ nowTime() | date: 'HH:mm' }}</div>
  </div>
</div>

<span class="end-time">{{ endTo() | date: 'HH:mm' }}</span>
