<ng-template #icon let-iconHref="href">
  <svg class="dz-icon" aria-hidden="true" focusable="false">
    <use [attr.href]="iconHref"></use>
  </svg>
</ng-template>

<div class="shadow shadow--hoverless dz-stepper glass">
  <header class="dz-stepper__header">
    @if (titleIcon()) {
      <ng-container *ngTemplateOutlet="icon; context: { href: titleIcon() }"></ng-container>
    }

    {{ title() }}
  </header>

  <main class="dz-stepper__main">
    <button
      class="dz-button dz-button--xs dz-button--round dz-button--activated dz-button--left"
      [disabled]="isDecrementDisabled()"
      (click)="decrement()"
    >
      <ng-container
        *ngTemplateOutlet="icon; context: { href: icons.ARROW_DROP_DOWN }"
      ></ng-container>
    </button>

    <div class="dz-stepper__value-wrapper">
      <span class="dz-stepper__value">{{ value() }} {{ valueLabel() }}</span>
    </div>

    <button
      class="dz-button dz-button--xs dz-button--round dz-button--activated dz-button--right"
      [disabled]="isIncrementDisabled()"
      (click)="increment()"
    >
      <ng-container
        *ngTemplateOutlet="icon; context: { href: icons.ARROW_DROP_DOWN }"
      ></ng-container>
    </button>
  </main>

  <footer class="dz-stepper__footer">
    @if (quickStep() > step()) {
      <button
        class="dz-button dz-button--xs dz-button--activated dz-button--round"
        [disabled]="isQuickDecrementDisabled()"
        (click)="adjust(-quickStep())"
      >
        <ng-container *ngTemplateOutlet="icon; context: { href: icons.MINUS }"></ng-container>

        {{ quickStep() }}
      </button>

      <button
        class="dz-button dz-button--xs dz-button--activated dz-button--round"
        [disabled]="isQuickIncrementDisabled()"
        (click)="adjust(quickStep())"
      >
        <ng-container *ngTemplateOutlet="icon; context: { href: icons.PLUS }"></ng-container>

        {{ quickStep() }}
      </button>
    }
  </footer>
</div>
