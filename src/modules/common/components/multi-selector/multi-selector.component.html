<ul
  class="dz-list dz-list--full"
  [class.dz-list--horizontal]="orientation() === 'horizontal'"
  [class.dz-list--vertical]="orientation() === 'vertical'"
  [class.shadow]="highlightedId()"
  [class.shadow--hoverless]="highlightedId()"
>
  @for (entity of entities(); track entity[this.idKey()]) {
    <li class="dz-list__item" [class.dz-list__item--highlighted]="isHighlighted(entity)">
      @if (isSelectable()) {
        <button
          [disabled]="isReadonly(entity)"
          class="dz-button"
          [class.dz-button--activated]="isSelected(entity)"
          [class]="'dz-button--' + size()"
          (click)="toggle(entity)"
        >
          @if (itemTemplate()) {
            <ng-container
              [ngTemplateOutlet]="itemTemplate()!"
              [ngTemplateOutletContext]="{ $implicit: entity }"
            >
            </ng-container>
          } @else {
            {{ getLabel(entity) | titlecase }}
          }
        </button>
      } @else {
        <div
          class="dz-icon-box"
          [class.strikethrough]="!isSelected(entity)"
          [class]="'dz-icon-box--' + size()"
        >
          @if (itemTemplate()) {
            <ng-container
              [ngTemplateOutlet]="itemTemplate()!"
              [ngTemplateOutletContext]="{ $implicit: entity }"
            >
            </ng-container>
          } @else {
            {{ getLabel(entity) | titlecase }}
          }
        </div>
      }
    </li>
  }
</ul>
