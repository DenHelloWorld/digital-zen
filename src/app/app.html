<header class="dz-header" [class.dark-theme]="theme() === colorSchemes.DARK">
  <nav class="dz-header__navigation">
    <button (click)="setViewType(viewTypes.FOCUS)" class="dz-button dz-button--round dz-button--md">
      <svg class="dz-icon" aria-hidden="true" focusable="false">
        <use href="#icon-person-zen"></use>
      </svg>
    </button>

    <button (click)="setViewType(viewTypes.MENU)" class="dz-button dz-button--round dz-button--md">
      <svg class="dz-icon" aria-hidden="true" focusable="false">
        <use href="#icon-menu"></use>
      </svg>
    </button>

    <!--    <button (click)="loginWithGoogle()" class="dz-button dz-button&#45;&#45;round dz-button&#45;&#45;md" title="Login with Google">-->
    <!--      <span style="font-weight: bold; font-size: 12px;">G</span>-->
    <!--    </button>-->

    <!--    <button (click)="logout()" class="dz-button dz-button&#45;&#45;md">-->
    <!--      Logout-->
    <!--    </button>-->
  </nav>

  <dz-theme-switcher />
</header>

<main class="dz-main" [class.dark-theme]="theme() === colorSchemes.DARK">
  @defer {
    @switch (currentViewType()) {
      @case (viewTypes.FOCUS) {
        <dz-focus />
      }

      @case (viewTypes.MENU) {
        <dz-menu />
      }
    }
  }
</main>

<dz-toast-container />
