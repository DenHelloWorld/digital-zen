<ng-template #icon let-iconHref="href">
  <svg class="dz-icon" aria-hidden="true" focusable="false">
    <use [attr.href]="iconHref"></use>
  </svg>
</ng-template>

<header class="dz-header" [class.dark-theme]="theme() === colorSchemes.DARK">
  <nav class="dz-header__navigation full">
    <button
      class="dz-button dz-button--nm"
      [progress]="currentPeriodProgress()"
      [progressConfig]="{ thickness: 3 }"
      [title]="uiText.HEADER.FOCUS_TITLE"
      [class.dz-button--activated]="currentRoute() === views.FOCUS"
      (click)="setViewType(views.FOCUS)"
      dzProgressBorder
    >
      <ng-container *ngTemplateOutlet="icon; context: { href: icons.PERSON_ZEN }" />
    </button>

    <button
      class="dz-button dz-button--nm"
      [title]="uiText.HEADER.PERIODS_LIST_TITLE"
      [class.dz-button--activated]="currentRoute() === views.MENU"
      (click)="setViewType(views.MENU)"
    >
      <ng-container *ngTemplateOutlet="icon; context: { href: icons.ASSIGMENT }" />
    </button>

    <button
      class="dz-button dz-button--nm"
      [progress]="pomodoroProgress()"
      [progressConfig]="{ thickness: 3 }"
      [title]="uiText.HEADER.POMODORO_MENU_TITLE"
      [class.dz-button--activated]="currentRoute() === views.POMODORO"
      (click)="setViewType(views.POMODORO)"
      dzProgressBorder
    >
      <ng-container *ngTemplateOutlet="icon; context: { href: icons.TOMATO }" />
    </button>

    <!--    <button-->
    <!--      class="dz-button dz-button&#45;&#45;nm"-->
    <!--      [title]="-->
    <!--        isGoogleAuthenticated()-->
    <!--          ? uiText.HEADER.LOGOUT_GOOGLE_TITLE-->
    <!--          : uiText.HEADER.LOGIN_GOOGLE_TITLE-->
    <!--      "-->
    <!--      [disabled]="isGoogleAuthPending()"-->
    <!--      (click)="isGoogleAuthenticated() ? logoutFromGoogle() : loginWithGoogle()"-->
    <!--    >-->
    <!--      <ng-container-->
    <!--        *ngTemplateOutlet="-->
    <!--          icon;-->
    <!--          context: { href: isGoogleAuthenticated() ? icons.LOGOUT : icons.GOOGLE_LOGO }-->
    <!--        "-->
    <!--      />-->
    <!--    </button>-->

    <a [href]="websites.PRIVACY_POLICY.url" target="_blank" rel="noopener noreferrer">
      <button class="dz-button dz-button--xs" [title]="uiText.FOOTER.PRIVACY_POLICY_ARIA_LABEL">
        <ng-container *ngTemplateOutlet="icon; context: { href: icons.PRIVACY_TIP }" />
      </button>
    </a>

    @if (!isSidePanel()) {
      <button class="dz-button dz-button--xs" (click)="openSidePanel()" title="Open in side panel">
        <ng-container *ngTemplateOutlet="icon; context: { href: icons.VIEW_SIDEBAR }" />
      </button>
    }

    <span class="full"></span>

    <button
      class="dz-button dz-button--xs"
      [disabled]="isImportingBackup() || isExportingBackup()"
      [title]="uiText.MENU.IMPORT_TITLE"
      (click)="triggerImport(importInput)"
    >
      <ng-container
        *ngTemplateOutlet="icon; context: { href: icons.IMPORT_SETTINGS }"
      ></ng-container>
    </button>

    <button
      class="dz-button dz-button--xs"
      [disabled]="isImportingBackup() || isExportingBackup()"
      [title]="uiText.MENU.EXPORT_TITLE"
      (click)="exportSettings()"
    >
      <ng-container
        *ngTemplateOutlet="icon; context: { href: icons.EXPORT_SETTINGS }"
      ></ng-container>
    </button>

    <input
      #importInput
      (change)="handleImportFile($event)"
      type="file"
      accept="application/json"
      hidden
    />
  </nav>

  <dz-theme-switcher />
</header>

<main class="dz-main" [class.dark-theme]="theme() === colorSchemes.DARK">
  @defer {
    @switch (currentRoute()) {
      @case (views.POMODORO) {
        <dz-pomodoro />
      }

      @case (views.EDIT_PERIOD) {
        <div class="dz-box">
          <dz-period-form />
        </div>
      }

      @case (views.ADD_PERIOD) {
        <div class="dz-box">
          <dz-period-form />
        </div>
      }

      @case (views.EDIT_PERIOD_LIBRARY) {
        <div class="dz-box">
          <dz-period-form />
        </div>
      }

      @case (views.MENU) {
        <div class="dz-box">
          <dz-menu />
        </div>
      }

      @default {
        <dz-focus />
      }
    }
  }
</main>

<dz-toast-container />
