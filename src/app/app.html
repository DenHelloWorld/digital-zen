<header class="dz-header" [class.dark-theme]="theme() === colorSchemes.DARK">
  <nav class="dz-header__navigation">
    <button (click)="setViewType(viewTypes.FOCUS)" class="dz-button dz-button--circle dz-button--md" [class.dz-button--activated]="isFocused()">
      <svg [class.pulse]="isFocused()" class="dz-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
        <path d="M272-160q-30 0-51-21t-21-51q0-21 12-39.5t32-26.5l156-62v-90q-54 63-125.5 96.5T120-320v-80q68 0 123.5-28T344-508l54-64q12-14 28-21t34-7h40q18 0 34 7t28 21l54 64q45 52 100.5 80T840-400v80q-83 0-154.5-33.5T560-450v90l156 62q20 8 32 26.5t12 39.5q0 30-21 51t-51 21H400v-20q0-26 17-43t43-17h120q9 0 14.5-5.5T600-260q0-9-5.5-14.5T580-280H460q-42 0-71 29t-29 71v20h-88Zm208-480q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z"/>
      </svg>
    </button>

    <button (click)="setViewType(viewTypes.MENU)"  class="dz-button dz-button--circle dz-button--md">
      <svg xmlns="http://www.w3.org/2000/svg" class="dz-icon" viewBox="0 0 24 24" stroke="currentColor" fill="none">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

    <dz-theme-switcher />
</header>

<main class="dz-main" [class.dark-theme]="theme() === colorSchemes.DARK">
  @defer {
    @switch (currentViewType()) {
      @case (viewTypes.FOCUS) {
        <dz-focus />
      }

      @case (viewTypes.MENU) {
        menu
      }
    }
  }
</main>
