<header class="dz-header" [class.dark-theme]="theme() === colorSchemes.DARK">
  <nav class="dz-header__navigation">
    <button
      [title]="uiText.HEADER.FOCUS_MENU_TITLE"
      (click)="setViewType(viewTypes.FOCUS)"
      class="dz-button dz-button--round dz-button--md"
    >
      <svg class="dz-icon" aria-hidden="true" focusable="false">
        <use [attr.href]="icons.PERSON_ZEN"></use>
      </svg>
    </button>

    <button
      [title]="uiText.HEADER.ADD_NEW_PERIOD_TITLE"
      (click)="setViewType(viewTypes.ADD_PERIOD)"
      class="dz-button dz-button--round dz-button--md"
    >
      <svg class="dz-icon" aria-hidden="true" focusable="false">
        <use [attr.href]="icons.PLUS"></use>
      </svg>
    </button>

    <button
      [title]="uiText.HEADER.POMODORO_MENU_TITLE"
      (click)="setViewType(viewTypes.POMODORO)"
      class="dz-button dz-button--round dz-button--md"
    >
      <svg class="dz-icon" aria-hidden="true" focusable="false">
        <use [attr.href]="icons.CHRONIC"></use>
      </svg>
    </button>

    <a [href]="websites.PRIVACY_POLICY.url" target="_blank" rel="noopener noreferrer">
      <button
        [title]="uiText.FOOTER.PRIVACY_POLICY_ARIA_LABEL"
        class="dz-button dz-button--round dz-button--md"
      >
        <svg class="dz-icon" aria-hidden="true" focusable="false">
          <use [attr.href]="icons.PRIVACY_TIP"></use>
        </svg>
      </button>
    </a>

    <button
      [title]="
        isGoogleAuthenticated()
          ? uiText.HEADER.LOGOUT_GOOGLE_TITLE
          : uiText.HEADER.LOGIN_GOOGLE_TITLE
      "
      (click)="isGoogleAuthenticated() ? logoutFromGoogle() : loginWithGoogle()"
      [disabled]="isGoogleAuthPending()"
      class="dz-button dz-button--round dz-button--md"
    >
      @if (isGoogleAuthPending()) {
        <dz-loader />
      } @else {
        <svg class="dz-icon" aria-hidden="true">
          <use [attr.href]="isGoogleAuthenticated() ? icons.LOGOUT : icons.GOOGLE_LOGO"></use>
        </svg>
      }
    </button>
  </nav>

  <dz-theme-switcher />
</header>

<main class="dz-main" [class.dark-theme]="theme() === colorSchemes.DARK">
  @defer {
    @switch (currentViewType()) {
      @case (viewTypes.FOCUS) {
        <dz-focus />
      }

      @case (viewTypes.POMODORO) {
        <dz-pomodoro />
      }

      @case (viewTypes.ADD_PERIOD) {
        <div class="dz-box">
          <dz-period-form mode="create" (completed)="setViewType(viewTypes.FOCUS)" />
        </div>
      }
    }
  }
</main>

<dz-toast-container />
