<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #f8fafc;
        background: #334155;
      }
      .box {
        padding: 2rem;
        border-radius: 8px;
        background: #fff;
        color: #334155;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      #timer {
        font-weight: bold;
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>⛔ Access Blocked</h1>
      <p>This website is blocked during your Digital Zen focus session.</p>
      <p>This tab will close automatically in <span id="timer">20</span> seconds.</p>
    </div>

    <script src="blocked-timer.js"></script>
  </body>
</html>
